<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Back to Work</title>
  <link rel="stylesheet" href="redirect.css" />
</head>
<body>
  <div class="card">
    <div class="lock-icon">🔒</div>
    <h1 id="headline">Stay focused.</h1>
    <p id="quote" class="quote"></p>
    <p id="blocked-info" class="blocked-info hidden"></p>

    <div class="stats">
      <div class="stat"><span id="time-left" class="stat-val">--:--</span><span class="stat-label">remaining</span></div>
      <div class="stat"><span id="phase-label" class="stat-val">—</span><span class="stat-label">phase</span></div>
      <div class="stat"><span id="cycle-label" class="stat-val">—</span><span class="stat-label">cycle</span></div>
    </div>

    <button id="btn-back" class="btn-back">↩ Back to Work</button>
  </div>
  <script src="redirect.js"></script>
</body>
</html>
